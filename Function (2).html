<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>함수 그래프 시각화</title>
<style>
*{
  box-sizing:border-box;
  user-select:none;
  -webkit-user-select:none;
}
body{
  margin:0;
  font-family:Arial,'Noto Sans KR',sans-serif;
  background:#f3f6fb;
  color:#111827;
}
.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}
h1{
  margin:0 0 14px;
  font-size:32px;
}
.layout{
  display:grid;
  grid-template-columns:1.4fr 1fr;
  gap:20px;
}
.card{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}
.graph-card{
  position:relative;
  overflow:hidden;
}
.graph-wrap{
  position:relative;
  width:100%;
  aspect-ratio:16/10;
  border:1px solid #dbe2ef;
  border-radius:16px;
  background:white;
  overflow:hidden;
}
#graph{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
  background:white;
  z-index:1;
}
#inkCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
  z-index:20;
  pointer-events:none;
}
button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  background:#e5edff;
}
button.active{
  background:#2563eb;
  color:white;
}
.row{
  margin-bottom:22px;
}
label{
  display:block;
  font-size:20px;
  font-weight:bold;
  margin-bottom:8px;
}
input[type=range]{
  width:100%;
}
.value{
  font-size:26px;
  font-weight:bold;
  color:#2563eb;
}
.note{
  margin-top:24px;
  font-size:18px;
  line-height:1.7;
  color:#444;
}
.ink-ui{
  position:fixed;
  right:92px;
  bottom:22px;
  z-index:30;
  display:none;
  align-items:center;
  gap:10px;
  background:rgba(255,255,255,0.94);
  border:1px solid #d1d5db;
  border-radius:18px;
  padding:10px 12px;
  box-shadow:0 8px 24px rgba(0,0,0,0.16);
  backdrop-filter:blur(8px);
}
.ink-ui.on{
  display:flex;
}
.color-btn{
  width:28px;
  height:28px;
  border-radius:999px;
  border:3px solid #fff;
  outline:1px solid #9ca3af;
  cursor:pointer;
  padding:0;
  box-shadow:none;
}
.color-btn.selected{
  outline:3px solid #111827;
}
.thick-btn{
  padding:8px 10px;
  font-size:14px;
  border-radius:10px;
  background:#e5e7eb;
  color:#111827;
  box-shadow:none;
}
.thick-btn.selected{
  background:#111827;
  color:white;
}
.clear-ink{
  padding:8px 12px;
  font-size:14px;
  border-radius:10px;
  background:#ef4444;
  color:white;
  box-shadow:none;
}
.ink-toggle{
  position:fixed;
  right:22px;
  bottom:22px;
  z-index:31;
  width:58px;
  height:58px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111827;
  color:white;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(0,0,0,0.22);
  line-height:1.2;
  text-align:center;
}
.ink-toggle.on{
  background:#f59e0b;
  color:#111827;
}
@media(max-width:900px){
  .layout{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>
<div class="container">
  <h1>함수 그래프 시각화</h1>

  <div class="layout">
    <div class="card graph-card">
      <div class="graph-wrap" id="graphWrap">
        <canvas id="graph" width="900" height="560"></canvas>
        <canvas id="inkCanvas"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <button id="linearBtn" class="active">1차함수</button>
        <button id="quadBtn">2차함수</button>
        <button id="inverseBtn">반비례</button>
      </div>

      <div class="row">
        <label id="sliderLabelA">a 값</label>
        <input type="range" id="aSlider" min="-10" max="10" value="1" step="0.1" />
        <div class="value">a = <span id="aText">1</span></div>
      </div>

      <div class="row" id="bRow">
        <label id="sliderLabelB">b 값</label>
        <input type="range" id="bSlider" min="-10" max="10" value="0" step="0.1" />
        <div class="value">b = <span id="bText">0</span></div>
      </div>

      <div class="row" id="hRow" style="display:none;">
        <label>x축 이동 h</label>
        <input type="range" id="hSlider" min="-10" max="10" value="0" step="0.1" />
        <div class="value">h = <span id="hText">0</span></div>
      </div>

      <div style="font-size:24px;font-weight:bold;margin-top:20px;">
        현재 식:
        <div id="formula" style="margin-top:10px;color:#dc2626;">y = x</div>
      </div>

      <div class="note">
        • 1차함수는 y절편과 기울기를 그래프 위에 표시합니다.<br />
        • 2차함수는 꼭짓점과 x축 이동을 확인할 수 있습니다.<br />
        • 반비례는 x=0에서 정의되지 않습니다.
      </div>
    </div>
  </div>
</div>

<div class="ink-ui" id="inkUi">
  <button class="color-btn selected" data-color="#111827" style="background:#111827"></button>
  <button class="color-btn" data-color="#dc2626" style="background:#dc2626"></button>
  <button class="color-btn" data-color="#2563eb" style="background:#2563eb"></button>
  <button class="color-btn" data-color="#16a34a" style="background:#16a34a"></button>
  <button class="thick-btn selected" data-width="3">얇게</button>
  <button class="thick-btn" data-width="6">보통</button>
  <button class="thick-btn" data-width="10">두껍게</button>
  <button class="clear-ink" id="undoInk" style="background:#2563eb;">되돌리기</button>
  <button class="clear-ink" id="clearInk">전체삭제</button>
</div>
<div class="ink-toggle" id="inkToggle">판서<br />OFF</div>

<script>
const graphCanvas = document.getElementById('graph');
const ctx = graphCanvas.getContext('2d');

const inkCanvas = document.getElementById('inkCanvas');
const inkCtx = inkCanvas.getContext('2d');

const graphWrap = document.getElementById('graphWrap');

const linearBtn = document.getElementById('linearBtn');
const quadBtn = document.getElementById('quadBtn');
const inverseBtn = document.getElementById('inverseBtn');

const aSlider = document.getElementById('aSlider');
const bSlider = document.getElementById('bSlider');
const hSlider = document.getElementById('hSlider');

const aText = document.getElementById('aText');
const bText = document.getElementById('bText');
const hText = document.getElementById('hText');

const formula = document.getElementById('formula');
const bRow = document.getElementById('bRow');
const hRow = document.getElementById('hRow');

let mode = 'linear';

const logicalW = 900;
const logicalH = 560;
const originX = 450;
const originY = 280;
const scale = 40;

function resizeGraphCanvas(){
  const rect = graphWrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;

  graphCanvas.width = Math.floor(rect.width * dpr);
  graphCanvas.height = Math.floor(rect.height * dpr);
  graphCanvas.style.width = rect.width + 'px';
  graphCanvas.style.height = rect.height + 'px';

  ctx.setTransform(dpr * rect.width / logicalW, 0, 0, dpr * rect.height / logicalH, 0, 0);
  draw();
}

function resizeInkCanvas(){
  const rect = graphWrap.getBoundingClientRect();
  const old = document.createElement('canvas');
  old.width = inkCanvas.width;
  old.height = inkCanvas.height;
  old.getContext('2d').drawImage(inkCanvas, 0, 0);

  const dpr = window.devicePixelRatio || 1;
  inkCanvas.width = Math.floor(rect.width * dpr);
  inkCanvas.height = Math.floor(rect.height * dpr);
  inkCanvas.style.width = rect.width + 'px';
  inkCanvas.style.height = rect.height + 'px';

  inkCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  if(old.width && old.height){
    inkCtx.drawImage(old, 0, 0, old.width / dpr, old.height / dpr);
  }
}

function resizeAll(){
  resizeGraphCanvas();
  resizeInkCanvas();
}

window.addEventListener('resize', resizeAll);

function formatNumber(n){
  n = Number(n);
  if(Math.abs(n) < 0.0001) return '0';
  if(Number.isInteger(n)) return String(n);
  return Number(n.toFixed(1)).toString();
}

function cleanNumber(n){
  n = Number(n);
  if(Math.abs(n) < 0.0001) return 0;
  return Number(n.toFixed(1));
}

function linearFormula(a, b){
  a = cleanNumber(a);
  b = cleanNumber(b);

  if(a === 0){
    return `y = ${formatNumber(b)}`;
  }

  let ax;
  if(a === 1) ax = 'x';
  else if(a === -1) ax = '-x';
  else ax = `${formatNumber(a)}x`;

  if(b === 0) return `y = ${ax}`;
  if(b > 0) return `y = ${ax} + ${formatNumber(b)}`;
  return `y = ${ax} - ${formatNumber(Math.abs(b))}`;
}

function quadraticFormula(a, h, b){
  a = cleanNumber(a);
  h = cleanNumber(h);
  b = cleanNumber(b);

  if(a === 0){
    return `y = ${formatNumber(b)}`;
  }

  let coef;
  if(a === 1) coef = '';
  else if(a === -1) coef = '-';
  else coef = formatNumber(a);

  let core;
  if(h === 0) core = 'x²';
  else if(h > 0) core = `(x - ${formatNumber(h)})²`;
  else core = `(x + ${formatNumber(Math.abs(h))})²`;

  let result = `y = ${coef}${core}`;
  if(b > 0) result += ` + ${formatNumber(b)}`;
  else if(b < 0) result += ` - ${formatNumber(Math.abs(b))}`;

  return result;
}

function inverseFormula(a){
  a = cleanNumber(a);
  if(a === 0) return 'y = 0';
  if(a === 1) return 'y = 1/x';
  if(a === -1) return 'y = -1/x';
  return `y = ${formatNumber(a)}/x`;
}

function toCanvas(x, y){
  return {
    x: originX + x * scale,
    y: originY - y * scale
  };
}

function drawText(text, x, y, color = '#111827', size = 18){
  ctx.save();
  ctx.font = `bold ${size}px Arial, Noto Sans KR, sans-serif`;
  ctx.fillStyle = color;
  ctx.lineWidth = 5;
  ctx.strokeStyle = 'white';
  ctx.strokeText(text, x, y);
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawGrid(){
  ctx.clearRect(0, 0, logicalW, logicalH);
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, logicalW, logicalH);

  ctx.strokeStyle = '#e5e7eb';
  ctx.lineWidth = 1;

  for(let x = 0; x <= logicalW; x += scale){
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, logicalH);
    ctx.stroke();
  }

  for(let y = 0; y <= logicalH; y += scale){
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(logicalW, y);
    ctx.stroke();
  }

  ctx.strokeStyle = '#111827';
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(0, originY);
  ctx.lineTo(logicalW, originY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(originX, 0);
  ctx.lineTo(originX, logicalH);
  ctx.stroke();

  drawText('x', logicalW - 24, originY - 10, '#374151', 16);
  drawText('y', originX + 10, 22, '#374151', 16);
}

function drawFunction(){
  const a = cleanNumber(aSlider.value);
  const b = cleanNumber(bSlider.value);
  const h = cleanNumber(hSlider.value);

  aText.textContent = formatNumber(a);
  bText.textContent = formatNumber(b);
  hText.textContent = formatNumber(h);

  ctx.strokeStyle = '#dc2626';
  ctx.lineWidth = 4;
  ctx.beginPath();

  let first = true;

  for(let px = 0; px <= logicalW; px++){
    const x = (px - originX) / scale;
    let y;

    if(mode === 'linear'){
      y = a * x + b;
      formula.textContent = linearFormula(a, b);
    }else if(mode === 'quadratic'){
      y = a * (x - h) * (x - h) + b;
      formula.textContent = quadraticFormula(a, h, b);
    }else{
      if(Math.abs(x) < 0.04){
        first = true;
        continue;
      }
      y = a / x;
      formula.textContent = inverseFormula(a);
    }

    const py = originY - y * scale;

    if(py < -1000 || py > logicalH + 1000){
      first = true;
      continue;
    }

    if(first){
      ctx.moveTo(px, py);
      first = false;
    }else{
      ctx.lineTo(px, py);
    }
  }

  ctx.stroke();

  if(mode === 'linear'){
    drawLinearMarks(a, b);
  }

  if(mode === 'quadratic'){
    drawQuadraticMarks(h, b);
  }

  if(mode === 'inverse'){
    drawInverseAsymptotes();
  }
}

function drawLinearMarks(a, b){
  const intercept = toCanvas(0, b);

  ctx.save();
  ctx.fillStyle = '#2563eb';
  ctx.beginPath();
  ctx.arc(intercept.x, intercept.y, 7, 0, Math.PI * 2);
  ctx.fill();
  drawText(`y절편 ${formatNumber(b)}`, intercept.x + 10, intercept.y - 12, '#2563eb', 17);

  const p1 = toCanvas(0, b);
  const p2 = toCanvas(1, b);
  const p3 = toCanvas(1, a + b);

  ctx.strokeStyle = '#16a34a';
  ctx.lineWidth = 3;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.lineTo(p2.x, p2.y);
  ctx.lineTo(p3.x, p3.y);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#16a34a';
  ctx.beginPath();
  ctx.arc(p1.x, p1.y, 5, 0, Math.PI * 2);
  ctx.arc(p2.x, p2.y, 5, 0, Math.PI * 2);
  ctx.arc(p3.x, p3.y, 5, 0, Math.PI * 2);
  ctx.fill();

  drawText('x가 1 증가', (p1.x + p2.x) / 2 - 30, p1.y + 24, '#16a34a', 15);
  drawText(`y는 ${formatNumber(a)} 변화`, p2.x + 10, (p2.y + p3.y) / 2, '#16a34a', 15);
  drawText(`기울기 ${formatNumber(a)}`, p3.x + 10, p3.y - 10, '#16a34a', 17);
  ctx.restore();
}

function drawQuadraticMarks(h, b){
  const v = toCanvas(h, b);

  ctx.save();
  ctx.fillStyle = '#7c3aed';
  ctx.beginPath();
  ctx.arc(v.x, v.y, 7, 0, Math.PI * 2);
  ctx.fill();

  drawText(`꼭짓점 (${formatNumber(h)}, ${formatNumber(b)})`, v.x + 10, v.y - 12, '#7c3aed', 17);
  drawText(`축의 방정식 x = ${formatNumber(h)}`, v.x + 10, v.y + 14, '#7c3aed', 17);

  ctx.strokeStyle = '#7c3aed';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(v.x, 0);
  ctx.lineTo(v.x, logicalH);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawInverseAsymptotes(){
  ctx.save();
  ctx.setLineDash([10, 10]);
  ctx.strokeStyle = '#2563eb';
  ctx.lineWidth = 3;

  ctx.beginPath();
  ctx.moveTo(originX, 0);
  ctx.lineTo(originX, logicalH);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(0, originY);
  ctx.lineTo(logicalW, originY);
  ctx.stroke();

  ctx.setLineDash([]);
  drawText('점근선', originX + 12, 42, '#2563eb', 16);
  ctx.restore();
}

function draw(){
  drawGrid();
  drawFunction();
}

function setMode(newMode){
  mode = newMode;

  linearBtn.classList.remove('active');
  quadBtn.classList.remove('active');
  inverseBtn.classList.remove('active');

  if(mode === 'linear'){
    linearBtn.classList.add('active');
    aSlider.min = -10;
    aSlider.max = 10;
    aSlider.step = 0.1;
    if(Number(aSlider.value) > 10) aSlider.value = 10;
    if(Number(aSlider.value) < -10) aSlider.value = -10;
    bRow.style.display = '';
    hRow.style.display = 'none';
  }else if(mode === 'quadratic'){
    quadBtn.classList.add('active');
    aSlider.min = -10;
    aSlider.max = 10;
    aSlider.step = 0.1;
    bRow.style.display = '';
    hRow.style.display = '';
  }else{
    inverseBtn.classList.add('active');
    aSlider.min = -10;
    aSlider.max = 10;
    aSlider.step = 0.1;
    bRow.style.display = 'none';
    hRow.style.display = 'none';
  }

  draw();
}

linearBtn.addEventListener('click', () => setMode('linear'));
quadBtn.addEventListener('click', () => setMode('quadratic'));
inverseBtn.addEventListener('click', () => setMode('inverse'));

aSlider.addEventListener('input', draw);
bSlider.addEventListener('input', draw);
hSlider.addEventListener('input', draw);

// 판서 기능
const inkToggle = document.getElementById('inkToggle');
const inkUi = document.getElementById('inkUi');

let inkWidth = 3;
let inkOn = false;
let inkDrawing = false;
let inkColor = '#111827';
let strokeHistory = [];
let currentStroke = null;

function canvasPos(e){
  const rect = inkCanvas.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

inkToggle.addEventListener('click', () => {
  inkOn = !inkOn;
  inkCanvas.style.pointerEvents = inkOn ? 'auto' : 'none';
  inkToggle.classList.toggle('on', inkOn);
  inkUi.classList.toggle('on', inkOn);
  inkToggle.innerHTML = inkOn ? '판서<br />ON' : '판서<br />OFF';
});

inkCanvas.addEventListener('pointerdown', e => {
  if(!inkOn) return;
  e.preventDefault();
  inkDrawing = true;
  inkCanvas.setPointerCapture(e.pointerId);

  const p = canvasPos(e);
  currentStroke = {
    color: inkColor,
    width: inkWidth,
    points: [p]
  };

  inkCtx.beginPath();
  inkCtx.moveTo(p.x, p.y);
});

inkCanvas.addEventListener('pointermove', e => {
  if(!inkDrawing || !inkOn || !currentStroke) return;
  e.preventDefault();

  const p = canvasPos(e);
  currentStroke.points.push(p);

  inkCtx.lineTo(p.x, p.y);
  inkCtx.strokeStyle = currentStroke.color;
  inkCtx.lineWidth = currentStroke.width;
  inkCtx.lineCap = 'round';
  inkCtx.lineJoin = 'round';
  inkCtx.stroke();
});

function endInkStroke(e){
  if(inkDrawing && currentStroke){
    strokeHistory.push(currentStroke);
  }
  inkDrawing = false;
  currentStroke = null;
  if(e && e.pointerId !== undefined){
    try{ inkCanvas.releasePointerCapture(e.pointerId); }catch(_){}
  }
}

inkCanvas.addEventListener('pointerup', endInkStroke);
inkCanvas.addEventListener('pointercancel', endInkStroke);
inkCanvas.addEventListener('pointerleave', endInkStroke);

document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    inkColor = btn.dataset.color;
  });
});

document.querySelectorAll('.thick-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.thick-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    inkWidth = Number(btn.dataset.width);
  });
});

function redrawAllStrokes(){
  const rect = inkCanvas.getBoundingClientRect();
  inkCtx.clearRect(0, 0, rect.width, rect.height);

  strokeHistory.forEach(stroke => {
    if(!stroke.points.length) return;

    inkCtx.beginPath();
    inkCtx.moveTo(stroke.points[0].x, stroke.points[0].y);

    for(let i = 1; i < stroke.points.length; i++){
      inkCtx.lineTo(stroke.points[i].x, stroke.points[i].y);
    }

    inkCtx.strokeStyle = stroke.color;
    inkCtx.lineWidth = stroke.width;
    inkCtx.lineCap = 'round';
    inkCtx.lineJoin = 'round';
    inkCtx.stroke();
  });
}

document.getElementById('undoInk').addEventListener('click', () => {
  strokeHistory.pop();
  redrawAllStrokes();
});

document.getElementById('clearInk').addEventListener('click', () => {
  strokeHistory = [];
  const rect = inkCanvas.getBoundingClientRect();
  inkCtx.clearRect(0, 0, rect.width, rect.height);
});

resizeAll();
setMode('linear');
</script>
</body>
</html>
